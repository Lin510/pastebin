name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check

    env:
      MONGODB_URI: mongodb://localhost:27017/test
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: $2b$10$placeholder000000000000000000000000000000000000000000000
      JWT_SECRET: ci_placeholder_secret_do_not_use_in_production_32chars
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
